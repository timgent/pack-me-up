<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
</head>

<body>
    <p>Processing authentication...</p>
    <script>
        const params = window.location.search.replace(/^\?/, "");
        // Navigate to the SPA with the OAuth query BEFORE the hash so auth can read it
        window.location.replace(`/?${params}#/solid-pod-handle-redirect`);
    </script>
</body>

</html>
